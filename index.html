<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* HERO TITLE */
.hero{
    margin-bottom:60px;
    text-align:center;
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:60px;
    font-weight:800;
    letter-spacing:4px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* MAPS CONTAINER */
.maps-container{
    display:flex;
    justify-content:center;
    gap:80px;
    flex-wrap:wrap;
}

/* MAP CARD */
.map-card{
    width:520px;
    height:340px;
    border-radius:35px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    position:relative;
    cursor:pointer;
    transition:.4s ease;
    box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

.map-card:hover{
    transform:scale(1.05);
}

/* OVERLAY */
.map-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(2px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:50px;
}

.map-overlay h2{
    font-family:'Orbitron',sans-serif;
    font-size:56px;
    font-weight:800;
    letter-spacing:6px;
}

/* SIDE BUTTONS */
.side-buttons{
    display:flex;
    gap:50px;
}

.side-btn{
    padding:20px 60px;
    border-radius:25px;
    font-size:30px;
    font-weight:800;
    border:none;
    cursor:pointer;
    transition:.3s ease;
}

.side-btn.tr{
    background:#f0a23b;
    color:#fff;
}

.side-btn.ct{
    background:#4a89dc;
    color:#000;
}

.side-btn:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

/* RESPONSIVE */
@media(max-width:768px){
    .map-card{
        width:90%;
        height:280px;
    }

    .map-overlay h2{
        font-size:38px;
    }

    .side-btn{
        font-size:22px;
        padding:15px 40px;
    }
}
</style>
</head>
<body>

<div class="hero">
    <h1>CS2 LINEUPS</h1>
</div>

<div class="maps-container">

    <!-- DUST2 -->
    <div class="map-card" style="background-image: url('https://i.imgur.com/dCPWbZU.png');">
        <div class="map-overlay">
            <h2>DUST2</h2>
            <div class="side-buttons">
                <button class="side-btn tr" onclick="selectSide('Dust2','T')">TR</button>
                <button class="side-btn ct" onclick="selectSide('Dust2','CT')">CT</button>
            </div>
        </div>
    </div>

    <!-- INFERNO -->
    <div class="map-card" style="background-image: url('https://i.imgur.com/mLQ0QdD.jpeg');">
        <div class="map-overlay">
            <h2>INFERNO</h2>
            <div class="side-buttons">
                <button class="side-btn tr" onclick="selectSide('Inferno','T')">TR</button>
                <button class="side-btn ct" onclick="selectSide('Inferno','CT')">CT</button>
            </div>
        </div>
    </div>

</div>

<script>
function selectSide(map, side){
    alert("Mapa: " + map + " | Side: " + side);

    // Depois podes fazer:
    // window.location.href = map + ".html?side=" + side;
}
</script>

</body>
</html>
