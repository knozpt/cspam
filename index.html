<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
}

.title{
    font-family:'Orbitron',sans-serif;
    font-size:50px;
    margin-bottom:60px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

section{
    width:100%;
    max-width:1200px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
}

/* MAP CARDS */
.map-card{
    width:450px;
    height:280px;
    border-radius:30px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    position:relative;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 15px 40px rgba(0,0,0,0.7);
}
.map-card:hover{transform:scale(1.05);}
.map-card .overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron',sans-serif;
    font-size:40px;
    font-weight:800;
}

/* BOTÕES */
.btn{
    padding:18px 50px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:800;
    cursor:pointer;
    transition:.3s;
}
.tr{background:#f0a23b;color:#fff;}
.ct{background:#4a89dc;color:#000;}
.utility{background:#ffa600;color:#000;}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* ESCONDER SEÇÕES */
.hidden{display:none;}

/* CARDS LINEUPS */
.lineups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    width:100%;
}

.card{
    background:#1a1a1a;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:.3s;
}
.card:hover{transform:scale(1.03);}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:20px;}
.card h3{margin-bottom:10px;}
.meta{font-size:14px;color:#aaa;margin-bottom:10px;}
</style>
</head>
<body>

<h1 class="title">CS2 LINEUPS</h1>

<!-- MAPAS -->
<section id="maps-section">
    <div class="map-card" style="background-image:url('https://i.imgur.com/dCPWbZU.png');" onclick="selectMap('Dust2')">
        <div class="overlay">DUST2</div>
    </div>
    <div class="map-card" style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg');" onclick="selectMap('Inferno')">
        <div class="overlay">INFERNO</div>
    </div>
</section>

<!-- SIDE -->
<section id="side-section" class="hidden">
    <button class="btn tr" onclick="selectSide('T')">TR</button>
    <button class="btn ct" onclick="selectSide('CT')">CT</button>
</section>

<!-- UTILITY -->
<section id="utility-section" class="hidden">
    <button class="btn utility" onclick="selectUtility('Smoke')">Smoke</button>
    <button class="btn utility" onclick="selectUtility('Flash')">Flash</button>
    <button class="btn utility" onclick="selectUtility('Molotov')">Molotov</button>
</section>

<!-- LINEUPS -->
<section id="lineups-section" class="hidden">
    <div class="lineups" id="lineupsContainer"></div>
</section>

<script>
let currentMap = "";
let currentSide = "";
let currentUtility = "";

// Base de dados simples
const lineupsData = [
    {
        map:"Dust2",
        side:"T",
        type:"Smoke",
        title:"Mid Door Smoke",
        img:"https://i.imgur.com/OX3VJgY.jpeg"
    },
    {
        map:"Inferno",
        side:"T",
        type:"Smoke",
        title:"Caixões Smoke",
        img:"https://i.imgur.com/Vhf9DaX.png"
    }
];

// Selecionar mapa
function selectMap(map){
    currentMap = map;
    document.getElementById('maps-section').classList.add('hidden');
    document.getElementById('side-section').classList.remove('hidden');
}

// Selecionar side
function selectSide(side){
    currentSide = side;
    document.getElementById('side-section').classList.add('hidden');
    document.getElementById('utility-section').classList.remove('hidden');
}

// Selecionar utility
function selectUtility(type){
    currentUtility = type;
    document.getElementById('utility-section').classList.add('hidden');
    document.getElementById('lineups-section').classList.remove('hidden');
    loadLineups();
}

// Carregar lineups filtrados
function loadLineups(){
    const container = document.getElementById("lineupsContainer");
    container.innerHTML = "";

    const filtered = lineupsData.filter(l =>
        l.map === currentMap &&
        l.side === currentSide &&
        l.type === currentUtility
    );

    if(filtered.length === 0){
        container.innerHTML = "<p>Nenhuma lineup encontrada.</p>";
        return;
    }

    filtered.forEach(l => {
        container.innerHTML += `
            <div class="card">
                <img src="${l.img}">
                <div class="card-content">
                    <h3>${l.title}</h3>
                    <div class="meta">${l.map} • ${l.side} • ${l.type}</div>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
