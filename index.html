<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link rel="icon" type="image/png" href="https://i.imgur.com/hwn6WSh.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    color:#fff;
    background:url('https://i.imgur.com/1QBzw09.png') no-repeat center center fixed;
    background-size:cover;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:0;
}

#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
}

/* HERO */
.hero{
    height:18vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Orbitron';
    font-size:34px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    font-size:13px;
    color:#ccc;
    margin-top:5px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:2;
}

/* MAPAS */
.maps-container{
    display:flex;
    flex-direction:column;
    gap:35px;
}

.map-box{
    height:220px;
    width:50%;
    border-radius:16px;
    background-size:cover;
    background-position:center;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    border:0px solid rgba(255,255,255,0.1);
}

.map-box::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.map-box h2{
    font-family:'Orbitron';
    font-size:20px;
    z-index:2;
}

.side-buttons{
    margin-top:15px;
    display:flex;
    gap:15px;
    z-index:2;
}

.side-select{
    padding:6px 14px;
    border-radius:8px;
    border:none;
    font-size:11px;
    cursor:pointer;
    font-weight:bold;
}

.side-select[data-side="T"]{
    background:#ffa600;
    color:#000;
}

.side-select[data-side="CT"]{
    background:#1d4ed8;
    color:#fff;
}

/* MAP VIEW */
#mapView{display:none;}

#mapTitle{
    text-align:center;
    font-family:'Orbitron';
    font-size:28px;
    margin-bottom:15px;
}

.utility-tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.utility-tab{
    padding:8px 16px;
    font-size:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    cursor:pointer;
}

.utility-tab.active{
    background:#ffa600;
    color:#000;
}

#backBtn{
    margin-bottom:15px;
    padding:6px 12px;
    font-size:11px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

/* LINEUPS */
.lineups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

.card{
    background:linear-gradient(145deg,#ffa600dc,#3a2e16e6);
    border-radius:15px;
    overflow:hidden;
}

.card-images{
    display:flex;
}

.card-images img{
    width:50%;
    height:140px;
    object-fit:cover;
    cursor:pointer;
}

.card-content{
    padding:12px;
}

.card h3{
    font-size:13px;
    margin-bottom:4px;
}

.card p{
    font-size:11px;
    opacity:.85;
}

/* MODAL */
.image-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.image-modal img{
    max-width:95%;
    max-height:85vh;
    border-radius:10px;
}

.image-modal .close,
.image-modal .arrow{
    position:absolute;
    color:#ffa600;
    font-size:30px;
    cursor:pointer;
    user-select:none;
}

.image-modal .close{
    top:20px;
    right:25px;
}

.image-modal .prev{left:20px; top:50%; transform:translateY(-50%);}
.image-modal .next{right:20px; top:50%; transform:translateY(-50%);}

/* MOBILE */
@media(max-width:600px){
    .map-box{height:130px;}
    .map-box h2{font-size:18px;}
    .hero h1{font-size:26px;}
    .lineups{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="particles-js"></div>

<section class="hero">
    <h1>CS2 - Spam</h1>
    <p>Escolhe e aprende</p>
</section>

<div class="container">

<section id="homeMaps" class="maps-container">

  <div class="map-box" data-map="Dust2" style="background-image:url('https://i.imgur.com/dCPWbZU.png')">
    <h2>DUST2</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

  <div class="map-box" data-map="Inferno" style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg')">
    <h2>INFERNO</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

</section>

<section id="mapView">
  <button id="backBtn">← Voltar</button>
  <h1 id="mapTitle"></h1>

  <div class="utility-tabs">
    <button class="utility-tab active" data-type="Smoke">Smokes</button>
    <button class="utility-tab" data-type="Flash">Flash</button>
    <button class="utility-tab" data-type="Molo">Molotov</button>
  </div>

  <div class="lineups">

    <div class="card" data-map="Dust2" data-side="T" data-type="Smoke">
      <div class="card-images">
        <img src="https://i.imgur.com/OX3VJgY.jpeg">
        <img src="https://i.imgur.com/pRQwpOs.jpeg">
      </div>
      <div class="card-content">
        <h3>Smoke Mid</h3>
        <p>Jumpthrow.</p>
      </div>
    </div>

  </div>
</section>

</div>

<!-- MODAL -->
<div id="imageModal" class="image-modal">
  <span class="close">&times;</span>
  <span class="arrow prev">&#10094;</span>
  <img id="modalImg">
  <span class="arrow next">&#10095;</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS('particles-js',{
  particles:{number:{value:50},color:{value:"#ffa600"},shape:{type:"circle"},
  opacity:{value:0.3},size:{value:2},move:{enable:true,speed:1.2}},
  retina_detect:true
});

/* FILTROS */
let selectedMap=null,selectedSide=null,selectedType="Smoke";
const home=document.getElementById("homeMaps");
const mapView=document.getElementById("mapView");
const mapTitle=document.getElementById("mapTitle");

document.querySelectorAll(".side-select").forEach(btn=>{
  btn.onclick=()=>{
    selectedMap=btn.closest(".map-box").dataset.map;
    selectedSide=btn.dataset.side;
    home.style.display="none";
    mapView.style.display="block";
    mapTitle.innerText=selectedMap+" - "+selectedSide;
    filter();
  };
});

document.getElementById("backBtn").onclick=()=>{
  mapView.style.display="none";
  home.style.display="flex";
};

document.querySelectorAll(".utility-tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".utility-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    selectedType=tab.dataset.type;
    filter();
  };
});

function filter(){
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display=
      card.dataset.map===selectedMap &&
      card.dataset.side===selectedSide &&
      card.dataset.type===selectedType
      ? "block":"none";
  });
}

/* MODAL */
const modal=document.getElementById("imageModal");
const modalImg=document.getElementById("modalImg");
let images=[],current=0;

document.querySelectorAll(".card-images img").forEach(img=>{
  img.onclick=()=>{
    const card=img.closest(".card");
    images=[...card.querySelectorAll("img")].map(i=>i.src);
    current=images.indexOf(img.src);
    openModal();
  };
});

function openModal(){
  modal.style.display="flex";
  modalImg.src=images[current];
}

function closeModal(){modal.style.display="none";}
function next(){current=(current+1)%images.length;modalImg.src=images[current];}
function prev(){current=(current-1+images.length)%images.length;modalImg.src=images[current];}

modal.querySelector(".close").onclick=closeModal;
modal.querySelector(".next").onclick=next;
modal.querySelector(".prev").onclick=prev;
modal.onclick=e=>{if(e.target===modal)closeModal();};

document.addEventListener("keydown",e=>{
  if(modal.style.display==="flex"){
    if(e.key==="Escape")closeModal();
    if(e.key==="ArrowRight")next();
    if(e.key==="ArrowLeft")prev();
  }
});
</script>

</body>
</html>
