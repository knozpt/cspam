<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link rel="icon" type="image/png" href="https://i.imgur.com/hwn6WSh.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    color:#fff;
    background:url('https://i.imgur.com/1QBzw09.png') no-repeat center center fixed;
    background-size:cover;
    overflow-x:hidden;
}
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:0;
}
#particles-js{position:fixed;inset:0;z-index:1;}

.hero{
    height:30vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    z-index:2;
}
.hero h1{
    font-family:'Orbitron';
    font-size:50px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.hero p{color:#ccc;margin-top:10px;}

.container{
    max-width:1300px;
    margin:auto;
    padding:60px 20px;
    position:relative;
    z-index:2;
}

/* MAP SECTIONS */
.maps{
    display:flex;
    flex-direction:column;
    gap:120px;
}
.map-section{
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}
.map-banner{
    height:300px;
    display:flex;
    align-items:flex-end;
    padding:40px;
    position:relative;
}
.map-banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
}
.map-banner h2{
    position:relative;
    font-size:48px;
    font-family:'Orbitron';
    z-index:2;
}
.sides{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
    padding:60px;
}
.side h3{
    font-size:22px;
    margin-bottom:25px;
}
.side.T h3{color:#ffa600;}
.side.CT h3{color:#00a2ff;}
.utility{margin-bottom:40px;}
.utility h4{color:#ccc;margin-bottom:15px;}
.lineups-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:linear-gradient(145deg,#ffa600dc,#534427e6);
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
}
.card:hover{
    transform:translateY(-8px) scale(1.03);
}
.card-images{
    display:flex;
}
.card-images img{
    width:50%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}
.card-content{
    padding:20px;
}
.card-content h5{
    margin-bottom:8px;
}

/* IMAGE MODAL */
.image-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.image-modal img{
    max-width:90%;
    max-height:85vh;
    border-radius:18px;
}
.image-modal .close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:40px;
    color:#ffa600;
    cursor:pointer;
}
.image-modal .arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    color:#ffa600;
    cursor:pointer;
}
.image-modal .prev{left:30px;}
.image-modal .next{right:30px;}

footer{
    text-align:center;
    padding:40px;
    background:#0a0a0a;
    color:#777;
    margin-top:100px;
}
</style>
</head>
<body>

<div id="particles-js"></div>

<section class="hero">
    <h1>CS2 Lineups</h1>
    <p>Mapa → Side → Utility</p>
</section>

<div class="container">
<div class="maps">

<!-- ================= DUST2 ================= -->
<section class="map-section">
<div class="map-banner" style="background:url('https://i.imgur.com/dCPWbZU.png') center/cover;">
<h2>Dust2</h2>
</div>

<div class="sides">

<div class="side T">
<h3>T Side</h3>

<div class="utility">
<h4>Smokes</h4>
<div class="lineups-grid">

<div class="card">
<div class="card-images">
<img src="https://i.imgur.com/OX3VJgY.jpeg">
<img src="https://i.imgur.com/pRQwpOs.jpeg">
</div>
<div class="card-content">
<h5>Mid Door Smoke</h5>
<p>Jumpthrow</p>
</div>
</div>

</div>
</div>
</div>

<div class="side CT">
<h3>CT Side</h3>
<div class="utility">
<h4>Molotovs</h4>
<div class="lineups-grid"></div>
</div>
</div>

</div>
</section>

</div>
</div>

<footer>© Designed by knozpt</footer>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
<span class="close">&times;</span>
<span class="arrow prev">&#10094;</span>
<img id="modalImg">
<span class="arrow next">&#10095;</span>
</div>

<script>
const modal=document.getElementById("imageModal");
const modalImg=document.getElementById("modalImg");
const closeBtn=modal.querySelector(".close");
const prevBtn=modal.querySelector(".prev");
const nextBtn=modal.querySelector(".next");
let images=[],currentIndex=0;

document.querySelectorAll(".card-images img").forEach(img=>{
img.addEventListener("click",()=>{
const card=img.closest(".card");
const cardImages=card.querySelectorAll(".card-images img");
images=[];
cardImages.forEach(i=>images.push(i.src));
currentIndex=images.indexOf(img.src);
modal.style.display="flex";
modalImg.src=images[currentIndex];
});
});

closeBtn.onclick=()=>modal.style.display="none";
nextBtn.onclick=()=>{currentIndex=(currentIndex+1)%images.length;modalImg.src=images[currentIndex];};
prevBtn.onclick=()=>{currentIndex=(currentIndex-1+images.length)%images.length;modalImg.src=images[currentIndex];};
modal.onclick=e=>{if(e.target===modal)modal.style.display="none";};
</script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
particlesJS('particles-js',{
particles:{number:{value:80},color:{value:"#ffa600"},size:{value:3},line_linked:{enable:true,color:"#ff7b00"},move:{speed:2}},
interactivity:{events:{onhover:{enable:true,mode:"repulse"}}}
});
</script>

</body>
</html>
