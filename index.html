<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://i.imgur.com/hwn6WSh.png">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    color:#fff;
    overflow-x:hidden;
    background: url('https://i.imgur.com/1QBzw09.png') no-repeat center center fixed;
    background-size: cover;
}

/* Overlay escuro */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.65);
    z-index:0;
}

/* PARTICLES */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
}

/* HERO */
.hero{
    height:30vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:60px;
    font-weight:800;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:3px;
}

.hero p{
    margin-top:10px;
    font-size:16px;
    color:#ccc;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    position:relative;
    z-index:2;
}

/* ================= HOME ================= */

.maps-container{
    display:flex;
    flex-direction:column;
    gap:60px;
}

.map-box{
    height:320px;
    border-radius:30px;
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    border:3px solid rgba(255,255,255,0.1);
    transition:.3s;
}

.map-box:hover{
    transform:scale(1.03);
    box-shadow:0 0 40px rgba(255,166,0,0.4);
}

.map-box::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.map-box h2{
    position:relative;
    font-family:'Orbitron';
    font-size:50px;
    z-index:2;
    letter-spacing:2px;
}

.side-buttons{
    position:relative;
    z-index:2;
    margin-top:25px;
    display:flex;
    gap:25px;
}

.side-select{
    padding:14px 35px;
    border-radius:16px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
}

.side-select:hover{
    transform:scale(1.1);
}

.side-select[data-side="T"]{
    background:#ffa600;
    color:black;
}

.side-select[data-side="CT"]{
    background:#1d4ed8;
    color:white;
}

/* ================= MAP VIEW ================= */

#mapView{
    display:none;
}

#mapTitle{
    font-family:'Orbitron';
    font-size:60px;
    margin-bottom:30px;
    text-align:center;
}

.utility-tabs{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:40px;
}

.utility-tab{
    padding:16px 40px;
    border-radius:18px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.utility-tab.active{
    background:#ffa600;
    color:black;
    box-shadow:0 0 20px rgba(255,166,0,0.8);
}

#backBtn{
    margin-bottom:20px;
    padding:10px 20px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

/* LINEUPS */

.lineups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:30px;
}

.card{
    background:linear-gradient(145deg,#ffa600dc,#3a2e16e6);
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 40px rgba(255,166,0,0.6);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    opacity:.85;
}

footer{
    text-align:center;
    padding:30px;
    background:#0a0a0a;
    margin-top:60px;
    color:#777;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<section class="hero">
    <h1>CS2 - Spam</h1>
    <p>Escolhe e aprende</p>
</section>

<div class="container">

<!-- HOME -->
<section id="homeMaps" class="maps-container">

  <div class="map-box" data-map="Dust2"
       style="background-image:url('https://i.imgur.com/dCPWbZU.png')">
    <h2>DUST2</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

  <div class="map-box" data-map="Inferno"
       style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg')">
    <h2>INFERNO</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

</section>

<!-- MAP VIEW -->
<section id="mapView">

  <button id="backBtn">← Voltar</button>
  <h1 id="mapTitle"></h1>

  <div class="utility-tabs">
    <button class="utility-tab active" data-type="Smoke">Smokes</button>
    <button class="utility-tab" data-type="Flash">Flash</button>
    <button class="utility-tab" data-type="Molo">Molotov</button>
  </div>

  <div class="lineups">

    <div class="card" data-map="Dust2" data-side="T" data-type="Smoke">
      <h3>Smoke Mid</h3>
      <p>Smoke para cobrir o meio.</p>
    </div>

    <div class="card" data-map="Inferno" data-side="T" data-type="Smoke">
      <h3>Smoke Caixões</h3>
      <p>Bloqueia visão da B.</p>
    </div>

  </div>

</section>

</div>

<footer>© Designed by knozpt</footer>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
particlesJS('particles-js',{
  particles:{
    number:{value:80,density:{enable:true,value_area:800}},
    color:{value:"#ffa600"},
    shape:{type:"circle"},
    opacity:{value:0.3},
    size:{value:3},
    line_linked:{enable:true,distance:150,color:"#ff7b00",opacity:0.2,width:1},
    move:{enable:true,speed:2}
  },
  interactivity:{detect_on:"canvas",events:{onhover:{enable:true,mode:"repulse"}}},
  retina_detect:true
});
</script>

<script>
let selectedMap = null;
let selectedSide = null;
let selectedType = "Smoke";

const home = document.getElementById("homeMaps");
const mapView = document.getElementById("mapView");
const mapTitle = document.getElementById("mapTitle");

document.querySelectorAll(".side-select").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    selectedMap = btn.closest(".map-box").dataset.map;
    selectedSide = btn.dataset.side;

    home.style.display = "none";
    mapView.style.display = "block";

    mapTitle.innerText = selectedMap + " - " + selectedSide;

    filterLineups();
  });
});

document.getElementById("backBtn").addEventListener("click", ()=>{
  mapView.style.display = "none";
  home.style.display = "flex";
});

document.querySelectorAll(".utility-tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".utility-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    selectedType = tab.dataset.type;
    filterLineups();
  });
});

function filterLineups(){
  document.querySelectorAll(".card").forEach(card=>{
    const match =
      card.dataset.map === selectedMap &&
      card.dataset.side === selectedSide &&
      card.dataset.type === selectedType;

    card.style.display = match ? "block" : "none";
  });
}
</script>

</body>
</html>
