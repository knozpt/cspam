<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
}

/* TITLE */
.title{
    font-family:'Orbitron',sans-serif;
    font-size:50px;
    margin-bottom:20px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BACK BUTTON */
.back-btn{
    margin-bottom:40px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#222;
    color:#fff;
    transition:.3s;
}
.back-btn:hover{
    background:#ff7b00;
    transform:translateY(-3px);
}

section{
    width:100%;
    max-width:1200px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
}

.hidden{display:none;}

/* MAP CARDS */
.map-card{
    width:400px;
    height:210px;
    border-radius:25px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    position:relative;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 15px 40px rgba(0,0,0,0.7);
}
.map-card:hover{transform:scale(1.05);}
.map-card .overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron',sans-serif;
    font-size:38px;
    font-weight:800;
}

/* BUTTONS */
.btn{
    padding:18px 50px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:800;
    cursor:pointer;
    transition:.3s;
}
.tr{background:#f0a23b;color:#fff;}
.ct{background:#4a89dc;color:#000;}
.utility{background:#ffa600;color:#000;}
.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* LINEUP CARDS */
.lineups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:30px;
    width:100%;
}

.card{
    background:#1a1a1a;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:.3s;
    padding-bottom:15px;
}
.card:hover{transform:scale(1.02);}

/* IMAGENS VERTICAIS */
.card-images{
    display:flex;
    flex-direction:column;
    gap:12px;
    padding:15px;
}

.image-wrapper{
    width:100%;
    aspect-ratio:16/9; /* Mantém horizontal */
    overflow:hidden;
    border-radius:15px;
}

.image-wrapper img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.4s;
}

.image-wrapper img:hover{
    transform:scale(1.08);
}

/* CARD CONTENT */
.card-content{
    padding:0 20px;
}

.card h3{
    margin-bottom:8px;
    font-size:20px;
}

.meta{
    font-size:14px;
    color:#aaa;
}
</style>
</head>
<body>

<h1 class="title">CS2 LINEUPS</h1>
<button id="backBtn" class="back-btn hidden" onclick="goBack()">← Voltar</button>

<!-- MAPAS -->
<section id="maps-section">
    <div class="map-card" style="background-image:url('https://i.imgur.com/dCPWbZU.png');" onclick="selectMap('Dust2')">
        <div class="overlay">DUST2</div>
    </div>
    <div class="map-card" style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg');" onclick="selectMap('Inferno')">
        <div class="overlay">INFERNO</div>
    </div>
    <div class="map-card" style="background-image:url('https://i.imgur.com/dCPWbZU.png');" onclick="selectMap('Mirage')">
        <div class="overlay">MIRAGE</div>
    </div>
</section>

<!-- SIDE -->
<section id="side-section" class="hidden">
    <button class="btn tr" onclick="selectSide('T')">TR</button>
    <button class="btn ct" onclick="selectSide('CT')">CT</button>
</section>

<!-- UTILITY -->
<section id="utility-section" class="hidden">
    <button class="btn utility" onclick="selectUtility('Smoke')">Smoke</button>
    <button class="btn utility" onclick="selectUtility('Flash')">Flash</button>
    <button class="btn utility" onclick="selectUtility('Molotov')">Molotov</button>
</section>

<!-- LINEUPS -->
<section id="lineups-section" class="hidden">
    <div class="lineups" id="lineupsContainer"></div>
</section>

<script>
let currentMap="", currentSide="", currentUtility="";
const backBtn=document.getElementById("backBtn");

const lineupsData=[
{
map:"Dust2",
side:"T",
type:"Smoke",
title:"Mid Door Smoke",
img1:"https://i.imgur.com/OX3VJgY.jpeg",
img2:"https://i.imgur.com/pRQwpOs.jpeg"
},
{
map:"Inferno",
side:"T",
type:"Smoke",
title:"Caixões Smoke",
img1:"https://i.imgur.com/Vhf9DaX.png",
img2:"https://i.imgur.com/HfXIPsM.png"
},
{
map:"Mirage",
side:"T",
type:"Smoke",
title:"Window Smoke",
img1:"https://i.imgur.com/CrA7eBW.jpeg",
img2:"https://i.imgur.com/CpGXjts.jpeg"
}
];

function selectMap(map){
currentMap=map;
document.getElementById('maps-section').classList.add('hidden');
document.getElementById('side-section').classList.remove('hidden');
backBtn.classList.remove("hidden");
}

function selectSide(side){
currentSide=side;
document.getElementById('side-section').classList.add('hidden');
document.getElementById('utility-section').classList.remove('hidden');
}

function selectUtility(type){
currentUtility=type;
document.getElementById('utility-section').classList.add('hidden');
document.getElementById('lineups-section').classList.remove('hidden');
loadLineups();
}

function goBack(){
if(!document.getElementById('lineups-section').classList.contains("hidden")){
document.getElementById('lineups-section').classList.add("hidden");
document.getElementById('utility-section').classList.remove("hidden");
return;
}
if(!document.getElementById('utility-section').classList.contains("hidden")){
document.getElementById('utility-section').classList.add("hidden");
document.getElementById('side-section').classList.remove("hidden");
return;
}
if(!document.getElementById('side-section').classList.contains("hidden")){
document.getElementById('side-section').classList.add("hidden");
document.getElementById('maps-section').classList.remove("hidden");
backBtn.classList.add("hidden");
}
}

function loadLineups(){
const container=document.getElementById("lineupsContainer");
container.innerHTML="";
const filtered=lineupsData.filter(l=>l.map===currentMap&&l.side===currentSide&&l.type===currentUtility);

if(filtered.length===0){
container.innerHTML="<p>Nenhuma lineup encontrada.</p>";
return;
}

filtered.forEach(l=>{
container.innerHTML+=`
<div class="card">
<div class="card-images">
<div class="image-wrapper">
<img src="${l.img1}">
</div>
<div class="image-wrapper">
<img src="${l.img2}">
</div>
</div>
<div class="card-content">
<h3>${l.title}</h3>
<div class="meta">${l.map} • ${l.side} • ${l.type}</div>
</div>
</div>`;
});
}
</script>

</body>
</html>
