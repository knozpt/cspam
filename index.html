<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* TITULO */
.title{
    font-size:50px;
    margin-bottom:60px;
    background:linear-gradient(to right,#ff7b00,#ffa600);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* CONTAINER DE MAPAS */
.map-container {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
  margin-top:50px;
}

/* CARD DE MAPA */
.map-card {
  position: relative;
  width:200px;
  height:150px;
  border-radius:15px;
  overflow:hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  border:2px solid #333;
  background-size: cover;
  background-position: center;

   /* CENTRALIZA CONTEÚDO */
  display: flex;
  flex-direction: column;
  justify-content: center;  /* vertical */
  align-items: center;      /* horizontal */
  text-align: center;
}

/* OVERLAY ESCURO */
.map-card::before {
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.2));
  pointer-events: none;
}

/* NOME DO MAPA */
.map-card h2 {
  position: relative;
  justify-content:center;
  margin:10px 0;
  font-size:1.2rem;
  z-index:1;
}

/* BOTÕES DE LADO */
.side-buttons {
  position: relative;
  z-index:1;
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top: 20px;
}
.side-buttons button {
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
.side-buttons .ct { background:#1e90ff; color:#000; }
.side-buttons .ct:hover { opacity:0.8; }
.side-buttons .tr { background:#ff9d00; color:#fff; }
.side-buttons .tr:hover { opacity:0.8; }

/* RESPONSIVE */
@media(max-width:768px){
    .map-card{width:90%;height:250px;}
    .side-buttons button, .utility-buttons button{font-size:22px;padding:15px 40px;}
}
</style>
</head>
<body>

<h1 class="title">CS2 LINEUPS</h1>

<!-- SEÇÃO MAPAS -->
<section id="maps-section">
    <div class="map-card" style="background-image:url('https://i.imgur.com/dCPWbZU.png');" onclick="selectMap('Dust2')">
        <div class="overlay">DUST2</div>
    </div>
    <div class="map-card" style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg');" onclick="selectMap('Inferno')">
        <div class="overlay">INFERNO</div>
    </div>
</section>

<!-- SEÇÃO SIDE -->
<section id="side-section" class="side-section">
    <h2 id="sideTitle"></h2>
    <div class="side-buttons">
        <button class="tr" onclick="selectSide('T')">TR</button>
        <button class="ct" onclick="selectSide('CT')">CT</button>
    </div>
</section>

<!-- SEÇÃO UTILITY -->
<section id="utility-section" class="utility-section">
    <h2 id="utilityTitle"></h2>
    <div class="utility-buttons">
        <button onclick="showUtility('Smoke')">Smoke</button>
        <button onclick="showUtility('Flash')">Flash</button>
        <button onclick="showUtility('Molotov')">Molotov</button>
    </div>
</section>

<script>
let currentMap = "";
let currentSide = "";

// Selecionar mapa
function selectMap(map){
    currentMap = map;
    document.getElementById('maps-section').style.display = 'none';
    document.getElementById('side-section').classList.add('active');
    document.getElementById('sideTitle').innerText = map;
}

// Selecionar side
function selectSide(side){
    currentSide = side;
    document.getElementById('side-section').classList.remove('active');
    document.getElementById('utility-section').classList.add('active');
    document.getElementById('utilityTitle').innerText = currentMap + ' - ' + currentSide;
}

// Mostrar utility selecionada
function showUtility(type){
    alert('Mapa: ' + currentMap + '\nSide: ' + currentSide + '\nUtility: ' + type);
    // Aqui você pode mostrar cards filtrados ou abrir modal
}
</script>

</body>
</html>
