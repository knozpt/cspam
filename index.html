<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Lineups</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#6b6b6b;
  color:white;
}

/* ================= HOME ================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.maps-container{
  display:flex;
  flex-direction:column;
  gap:60px;
}

.map-box{
  height:320px;
  border-radius:30px;
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
  border:4px solid #333;
}

.map-box::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.map-box h2{
  position:relative;
  font-family:'Orbitron';
  font-size:50px;
  z-index:2;
  letter-spacing:2px;
}

.side-buttons{
  position:relative;
  z-index:2;
  margin-top:25px;
  display:flex;
  gap:25px;
}

.side-select{
  padding:14px 35px;
  border-radius:16px;
  font-weight:bold;
  border:none;
  cursor:pointer;
  font-size:18px;
  transition:.2s;
}

.side-select:hover{
  transform:scale(1.1);
}

.side-select[data-side="T"]{
  background:#ffa600;
  color:black;
}

.side-select[data-side="CT"]{
  background:#1d4ed8;
  color:white;
}

/* ================= MAP VIEW ================= */

#mapView{
  display:none;
}

#mapTitle{
  font-family:'Orbitron';
  font-size:60px;
  margin-bottom:30px;
  text-align:center;
}

.utility-tabs{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-bottom:40px;
}

.utility-tab{
  padding:18px 40px;
  border-radius:20px;
  background:#1c1c1c;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
  transition:.2s;
}

.utility-tab.active{
  background:#f0a23a;
  color:black;
}

#backBtn{
  margin-bottom:20px;
  padding:10px 20px;
  border-radius:12px;
  border:none;
  background:#222;
  color:white;
  cursor:pointer;
}

.lineups{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:30px;
}

.card{
  background:#111;
  border-radius:30px;
  padding:30px;
  border:4px solid #f0a23a;
}

.card h3{
  color:#f0a23a;
  margin-bottom:10px;
}

.card p{
  opacity:.8;
}
</style>
</head>

<body>

<div class="container">

<!-- ================= HOME ================= -->
<section id="homeMaps" class="maps-container">

  <div class="map-box" data-map="Dust2"
       style="background-image:url('https://i.imgur.com/dCPWbZU.png')">
    <h2>DUST2</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

  <div class="map-box" data-map="Inferno"
       style="background-image:url('https://i.imgur.com/mLQ0QdD.jpeg')">
    <h2>INFERNO</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

  <div class="map-box" data-map="Mirage"
       style="background-image:url('https://i.imgur.com/JIaEDwg.png')">
    <h2>MIRAGE</h2>
    <div class="side-buttons">
      <button class="side-select" data-side="T">TR</button>
      <button class="side-select" data-side="CT">CT</button>
    </div>
  </div>

</section>

<!-- ================= MAP VIEW ================= -->

<section id="mapView">

  <button id="backBtn">← Voltar</button>

  <h1 id="mapTitle"></h1>

  <div class="utility-tabs">
    <button class="utility-tab active" data-type="Smoke">Smokes</button>
    <button class="utility-tab" data-type="Flash">Flash</button>
    <button class="utility-tab" data-type="Molo">Molotov</button>
  </div>

  <div class="lineups">

    <!-- EXEMPLO LINEUPS -->
    <div class="card" data-map="Dust2" data-side="T" data-type="Smoke">
      <h3>Smoke Mid</h3>
      <p>Smoke para cobrir o meio.</p>
    </div>

    <div class="card" data-map="Dust2" data-side="CT" data-type="Flash">
      <h3>Flash Long</h3>
      <p>Flash rápida para retake long.</p>
    </div>

    <div class="card" data-map="Inferno" data-side="T" data-type="Smoke">
      <h3>Smoke Caixões</h3>
      <p>Bloqueia visão da B.</p>
    </div>

  </div>

</section>

</div>

<script>
let selectedMap = null;
let selectedSide = null;
let selectedType = "Smoke";

const home = document.getElementById("homeMaps");
const mapView = document.getElementById("mapView");
const mapTitle = document.getElementById("mapTitle");

document.querySelectorAll(".side-select").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    selectedMap = btn.closest(".map-box").dataset.map;
    selectedSide = btn.dataset.side;

    home.style.display = "none";
    mapView.style.display = "block";

    mapTitle.innerText = selectedMap + " - " + selectedSide;

    filterLineups();
  });
});

document.getElementById("backBtn").addEventListener("click", ()=>{
  mapView.style.display = "none";
  home.style.display = "flex";
});

document.querySelectorAll(".utility-tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".utility-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    selectedType = tab.dataset.type;
    filterLineups();
  });
});

function filterLineups(){
  document.querySelectorAll(".card").forEach(card=>{
    const match =
      card.dataset.map === selectedMap &&
      card.dataset.side === selectedSide &&
      card.dataset.type === selectedType;

    card.style.display = match ? "block" : "none";
  });
}
</script>

</body>
</html>
